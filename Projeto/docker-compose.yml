services:
  broker:
    build: ./broker
    container_name: broker
    environment:
      FRONTEND_BIND: tcp://*:5555
      BACKEND_BIND: tcp://*:5556
      EXPECTED_SERVERS: "4"
      SERVER_RPC_TIMEOUT_MS: "20000"
      DEAD_SERVER_TIMEOUT_MS: "20000"
    ports:
      - "5555:5555"
      - "5556:5556"

  pubsub_proxy:
    build: ./pubsub_proxy
    container_name: pubsub_proxy
    environment:
      XSUB_BIND: tcp://*:5557
      XPUB_BIND: tcp://*:5558
    ports:
      - "5557:5557"
      - "5558:5558"

  reference_service:
    build: ./reference_service
    container_name: reference_service
    environment:
      REFERENCE_BIND: tcp://*:5560
      SERVER_ORDER: js_server_1,js_server_2,py_server_1,py_server_2
      HEARTBEAT_TIMEOUT_SECONDS: "35"
    ports:
      - "5560:5560"

  py_server_1:
    build: ./python/server
    container_name: py_server_1
    depends_on:
      - broker
      - pubsub_proxy
      - reference_service
    environment:
      SERVER_ID: py_server_1
      BACKEND_ENDPOINT: tcp://broker:5556
      PUBSUB_PROXY_IN_ENDPOINT: tcp://pubsub_proxy:5557
      REFERENCE_ENDPOINT: tcp://reference_service:5560
      DATA_FILE: /data/state.json
    volumes:
      - ./data/py_server_1:/data

  py_server_2:
    build: ./python/server
    container_name: py_server_2
    depends_on:
      - broker
      - pubsub_proxy
      - reference_service
    environment:
      SERVER_ID: py_server_2
      BACKEND_ENDPOINT: tcp://broker:5556
      PUBSUB_PROXY_IN_ENDPOINT: tcp://pubsub_proxy:5557
      REFERENCE_ENDPOINT: tcp://reference_service:5560
      DATA_FILE: /data/state.json
    volumes:
      - ./data/py_server_2:/data

  js_server_1:
    build: ./node/server
    container_name: js_server_1
    depends_on:
      - broker
      - pubsub_proxy
      - reference_service
    environment:
      SERVER_ID: js_server_1
      BACKEND_ENDPOINT: tcp://broker:5556
      PUBSUB_PROXY_IN_ENDPOINT: tcp://pubsub_proxy:5557
      REFERENCE_ENDPOINT: tcp://reference_service:5560
      DATA_FILE: /data/state.json
    volumes:
      - ./data/js_server_1:/data

  js_server_2:
    build: ./node/server
    container_name: js_server_2
    depends_on:
      - broker
      - pubsub_proxy
      - reference_service
    environment:
      SERVER_ID: js_server_2
      BACKEND_ENDPOINT: tcp://broker:5556
      PUBSUB_PROXY_IN_ENDPOINT: tcp://pubsub_proxy:5557
      REFERENCE_ENDPOINT: tcp://reference_service:5560
      DATA_FILE: /data/state.json
    volumes:
      - ./data/js_server_2:/data

  py_client_1:
    build: ./python/client
    container_name: py_client_1
    depends_on:
      - broker
      - pubsub_proxy
      - py_server_1
      - py_server_2
      - js_server_1
      - js_server_2
    environment:
      CLIENT_NAME: py_client_1
      USERNAME: alice_py
      TARGET_CHANNEL: backend
      BROKER_ENDPOINT: tcp://broker:5555
      PUBSUB_PROXY_OUT_ENDPOINT: tcp://pubsub_proxy:5558
      STARTUP_DELAY_SECONDS: "8"

  py_client_2:
    build: ./python/client
    container_name: py_client_2
    depends_on:
      - broker
      - pubsub_proxy
      - py_server_1
      - py_server_2
      - js_server_1
      - js_server_2
    environment:
      CLIENT_NAME: py_client_2
      USERNAME: bob_py
      TARGET_CHANNEL: frontend
      BROKER_ENDPOINT: tcp://broker:5555
      PUBSUB_PROXY_OUT_ENDPOINT: tcp://pubsub_proxy:5558
      STARTUP_DELAY_SECONDS: "10"

  js_client_1:
    build: ./node/client
    container_name: js_client_1
    depends_on:
      - broker
      - pubsub_proxy
      - py_server_1
      - py_server_2
      - js_server_1
      - js_server_2
    environment:
      CLIENT_NAME: js_client_1
      USERNAME: carol_js
      TARGET_CHANNEL: devops
      BROKER_ENDPOINT: tcp://broker:5555
      PUBSUB_PROXY_OUT_ENDPOINT: tcp://pubsub_proxy:5558
      STARTUP_DELAY_SECONDS: "12"

  js_client_2:
    build: ./node/client
    container_name: js_client_2
    depends_on:
      - broker
      - pubsub_proxy
      - py_server_1
      - py_server_2
      - js_server_1
      - js_server_2
    environment:
      CLIENT_NAME: js_client_2
      USERNAME: dave_js
      TARGET_CHANNEL: analytics
      BROKER_ENDPOINT: tcp://broker:5555
      PUBSUB_PROXY_OUT_ENDPOINT: tcp://pubsub_proxy:5558
      STARTUP_DELAY_SECONDS: "14"